name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every `run:` step executes inside `nix develop`, so tools (go, golangci-lint)
# come straight from the flake devShell with no per-step prefix.
defaults:
  run:
    shell: nix develop --command bash -e {0}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: golangci-lint
        run: golangci-lint run ./...

  nix-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main

      - name: Setup Nix cache (hestia)
        uses: Mic92/hestia/action@ff07bb902a9968ac0c3d0e51d90a606662a375d8 # main

      - name: Nix build
        run: nix build

      - name: Nix flake check
        run: nix flake check
